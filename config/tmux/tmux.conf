unbind r
bind r source-file $HOME/.config/tmux/tmux.conf

set -g prefix C-f

set -g mouse on
set -sg escape-time 10

setw -g mode-keys vi
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

set-option -g status-position top
set-option -a terminal-features 'xterm-256color:RGB'

source-file $HOME/.config/tmux/flexoki-dark.tmuxtheme

# NOTE: to install tmp `git clone https://github.com/tmux-plugins/tpm $HOME/.config/tmux/plugins/tpm`
# Key bindings
# Install plugins: prefix + I
# Update plugins: prefix + u
# Uninstall plugins: prefix + alt + u

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-capture-pane-contents 'on'

set -g @plugin 'alexwforsythe/tmux-which-key' # prefix + space

# Status bar
set -g status-right "#{pomodoro_status} %Y-%m-%d %H:%M #{tmux_mode_indicator}"
set -g status-interval 1

set -g @plugin 'MunifTanjim/tmux-mode-indicator'

set -g @plugin 'MunifTanjim/tmux-suspend'
set -g @suspend_key 'F12'
set -g @suspend_suspended_options " \
  @mode_indicator_custom_prompt:: ---- , \
  @mode_indicator_custom_mode_style::bg=brightblack\\,fg=black, \
"

set -g @plugin 'olimorris/tmux-pomodoro-plus'
set -g @pomodoro_on "#[fg=$text_red]🍅 "
set -g @pomodoro_complete "#[fg=$text_green]🍅 "
set -g @pomodoro_pause "#[fg=$color_yellow]🍅 "
set -g @pomodoro_prompt_break "#[fg=$color_green]🕤 ? "
set -g @pomodoro_prompt_pomodoro "#[fg=$color_gray]🕤 ? "
set -g @pomodoro_granularity 'on'

# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '$HOME/.config/tmux/plugins/tpm/tpm'
