set -g prefix C-f
set -g mouse on
set -sg escape-time 10
set -ag terminal-features 'clipboard:xterm-256color:256:RGB'

setw -g mode-keys vi
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R


################################### WINDOWS ####################################

bind c new-window -c "#{pane_current_path}"
set -g base-index 1
set -g renumber-windows on


#################################### PANES #####################################

bind \% split-window -h -c "#{pane_current_path}"
bind \" split-window -v -c "#{pane_current_path}"


################################# STATUS LINE ##################################

source-file $HOME/.config/tmux/flexoki-dark.tmuxtheme
set -g status-position top
set -g status-interval 1
set -g status-right "#[fg=#$color_bg_1,bg=#$color_green]#{pomodoro_status}#[fg=#$color_bg_1,bg=#$color_orange]  #{b:pane_current_path} #[fg=#$color_bg_1,bg=#$color_purple]  %Y-%m-%d %H:%M #{tmux_mode_indicator}"


################################### PLUGINS ####################################

# NOTE: to install tmp `git clone https://github.com/tmux-plugins/tpm $HOME/.config/tmux/plugins/tpm`
# Key bindings
# Install plugins: prefix + I
# Update plugins: prefix + u
# Uninstall plugins: prefix + alt + u

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-capture-pane-contents 'on'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

set -g @plugin 'alexwforsythe/tmux-which-key' # prefix + space

set -g @plugin 'MunifTanjim/tmux-mode-indicator'

set -g @plugin 'MunifTanjim/tmux-suspend'
set -g @suspend_key 'F12'
set -g @suspend_suspended_options " \
  @mode_indicator_custom_prompt:: ---- , \
  @mode_indicator_custom_mode_style::bg=brightblack\\,fg=black, \
"

set -g @plugin 'olimorris/tmux-pomodoro-plus'
set -g @pomodoro_on "#[fg=#$color_red]🍅 "
set -g @pomodoro_complete "#[fg=#$color_blue]🍅 "
set -g @pomodoro_pause "#[fg=#$color_yellow]🍅 "
set -g @pomodoro_prompt_break "#[fg=#$color_orange]🕤 ? "
set -g @pomodoro_prompt_pomodoro "#[fg=#$color_ui_1]🕤 ? "
set -g @pomodoro_granularity 'on'

# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '$HOME/.config/tmux/plugins/tpm/tpm'
