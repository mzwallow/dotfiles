<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>
  <!-- Set default sans-serif font -->
  <alias>
    <family>sans-serif</family>
    <prefer>
      <family>Google Sans</family>
    </prefer>
  </alias>
  <!-- Set default serif font -->
  <alias>
    <family>serif</family>
    <prefer>
      <family>Noto Serif</family>
    </prefer>
  </alias>
  <!-- Set default monospace font -->
  <alias>
    <family>monospace</family>
    <prefer>
      <family>DepartureMono Nerd Font</family>
    </prefer>
  </alias>
  <!-- Thai -->
  <!-- "lang=th" or "lang=th-*" -->
  <match target="pattern">
    <test compare="contains" name="lang">
      <string>th</string>
    </test>
    <test name="family">
      <string>serif</string>
    </test>
    <edit binding="strong" mode="append" name="family">
      <string>Google Sans</string>
    </edit>
  </match>
  <match target="pattern">
    <test compare="contains" name="lang">
      <string>th</string>
    </test>
    <test name="family">
      <string>sans-serif</string>
    </test>
    <edit binding="strong" mode="append" name="family">
      <string>Google Sans</string>
    </edit>
  </match>
  <match target="pattern">
    <test compare="contains" name="lang">
      <string>th</string>
    </test>
    <test name="family">
      <string>monospace</string>
    </test>
    <edit binding="strong" mode="append" name="family">
      <string>IBM Plex Sans Thai Looped</string>
    </edit>
  </match>
</fontconfig>
